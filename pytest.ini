[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

# Ładne output
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals
    --tb=short

# Markery (użyj np. @pytest.mark.slow żeby skipnąć powolne testy)
markers =
    slow: marks tests as slow (run with '-m slow')
    integration: integration tests (wymagają uruchomionej bazy)
    unit: fast unit tests
