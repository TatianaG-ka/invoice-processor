# ============================================
# Invoice Processor - docker-compose (v2 PRO)
# ============================================
# Pełna wersja dla tygodnia 2 (dzień 9-10).
# Zawiera: api, worker, postgres, redis, qdrant.
#
# Używaj TEJ wersji kiedy zaimplementujesz async + Redis + Qdrant.
#
# Użycie:
#   docker-compose -f docker-compose.v2.yml up --build
#
# Albo: zmień nazwy plików - v1 na v1.yml, v2 na docker-compose.yml

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoice-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://invoice_user:invoice_pass@postgres:5432/invoices
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=invoices
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - EXTRACTOR_STRATEGY=${EXTRACTOR_STRATEGY:-openai}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/code/app
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoice-worker
    environment:
      - DATABASE_URL=postgresql://invoice_user:invoice_pass@postgres:5432/invoices
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=invoices
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - EXTRACTOR_STRATEGY=${EXTRACTOR_STRATEGY:-openai}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: rq worker --url redis://redis:6379 default
    volumes:
      - ./app:/code/app
    restart: unless-stopped
    # WSKAZÓWKA: możesz uruchomić kilka workerów:
    # docker-compose -f docker-compose.v2.yml up --scale worker=3

  postgres:
    image: postgres:16-alpine
    container_name: invoice-postgres
    environment:
      POSTGRES_USER: invoice_user
      POSTGRES_PASSWORD: invoice_pass
      POSTGRES_DB: invoices
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice_user -d invoices"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: invoice-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: invoice-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
