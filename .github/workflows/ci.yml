name: CI

# Kiedy się uruchamia
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # Job 1: Lint
  # ============================================
  lint:
    name: Lint code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Ruff check
        run: ruff check app tests

      - name: Ruff format check
        run: ruff format --check app tests

  # ============================================
  # Job 2: Tests
  # ============================================
  test:
    name: Run tests
    runs-on: ubuntu-latest

    # Serwisy potrzebne do testów integracyjnych
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: invoice_user
          POSTGRES_PASSWORD: invoice_pass
          POSTGRES_DB: invoices_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U invoice_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies (Tesseract + Poppler)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-pol poppler-utils

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://invoice_user:invoice_pass@localhost:5432/invoices_test
          REDIS_URL: redis://localhost:6379
          OPENAI_API_KEY: fake-key-for-tests
          OPENAI_MODEL: gpt-4o-mini
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

# ============================================
# WSKAZÓWKI:
# ============================================
# - Ten workflow używasz od tygodnia 2 (dzień 12 projektu)
# - Na początku możesz zakomentować job 'test' jeśli testy nie są gotowe
# - Sekrety (np. prawdziwy OPENAI_API_KEY do deployment) dodajesz w:
#   Settings → Secrets and variables → Actions → New repository secret
# - Na dashboardzie GitHuba zobaczysz zielone/czerwone ikony przy commitach
# - Dodaj badge do README:
#   ![CI](https://github.com/tatianagolinska/invoice-processor/actions/workflows/ci.yml/badge.svg)
