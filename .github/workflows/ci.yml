name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # Job 1: Lint
  # ============================================
  lint:
    name: Lint code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        # ruff version is pinned in pyproject.toml [project.optional-dependencies.dev]
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check app tests scripts

      - name: Ruff format check
        run: ruff format --check app tests

  # ============================================
  # Job 2: Tests
  # ============================================
  test:
    name: Run tests
    runs-on: ubuntu-latest

    # Services required by integration tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: invoice_user
          POSTGRES_PASSWORD: invoice_pass
          POSTGRES_DB: invoices_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U invoice_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies (Tesseract + Poppler)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-pol poppler-utils

      - name: Install Python dependencies
        # [test] extra = pytest stack only — skips ruff/black/mypy for faster CI test job
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://invoice_user:invoice_pass@localhost:5432/invoices_test
          REDIS_URL: redis://localhost:6379
          OPENAI_API_KEY: fake-key-for-tests
          OPENAI_MODEL: gpt-4o-mini
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
